name: CI

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - name: Run self-test
        run: uv run --script scripts/cage_kernel.py test
      - name: Run lint
        run: uv run --script scripts/cage_kernel.py lint
      - name: Run typecheck
        run: uv run --script scripts/cage_kernel.py typecheck

  release-artifacts:
    name: Build RC Release Artifacts
    if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref_name, '-rc.')
    needs: validate
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - name: Install build tools
        run: brew install container zstd
      - name: Confirm runner and container runtime
        run: |
          uname -a
          sw_vers
          container --version
      - name: Start container system
        run: |
          yes | container system start
          container system status
      - name: Build kernel
        run: uv run --script scripts/cage_kernel.py build
      - name: Package artifacts
        run: uv run --script scripts/cage_kernel.py package --acceptance-result not_run
      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: |
            dist/vmlinux.zst
            dist/manifest.json
            dist/SHA256SUMS
