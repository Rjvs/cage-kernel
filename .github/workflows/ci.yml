name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - name: Run self-test
        run: uv run --script scripts/cage_kernel.py test
      - name: Run lint
        run: uv run --script scripts/cage_kernel.py lint
      - name: Run typecheck
        run: uv run --script scripts/cage_kernel.py typecheck

  release-artifacts:
    name: Build RC Release Artifacts
    if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref_name, '-rc.')
    needs: validate
    runs-on:
      - self-hosted
      - macOS
      - ARM64
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - name: Ensure zstd is available
        run: command -v zstd >/dev/null || brew install zstd
      - name: Build kernel
        run: uv run --script scripts/cage_kernel.py build
      - name: Package artifacts
        run: uv run --script scripts/cage_kernel.py package --acceptance-result not_run
      - name: Upload release artifacts
        uses: softprops/action-gh-release@v3
        with:
          prerelease: true
          files: |
            dist/vmlinux.zst
            dist/manifest.json
            dist/SHA256SUMS
